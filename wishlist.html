     background: #f36666;

<body>

<h1>🎀 Add Dream 🎀</h1>
<input type="text" id="wishInput" placeholder="Enter your wish...">
<button id="addBtn">Add</button>

<ul id="wishList"></ul>

<script>
const wishInput = document.getElementById('wishInput');
const addBtn = document.getElementById('addBtn');
const wishList = document.getElementById('wishList');

// Load saved wishes from localStorage
let wishes = JSON.parse(localStorage.getItem('wishes')) || [];
renderList();

// Add new wish
addBtn.addEventListener('click', () => {
    const text = wishInput.value.trim();
    if (text === "") {
        alert("Please enter a wish!");
        return;
    }
    wishes.push({ text, done: false });
    saveAndRender();
    wishInput.value = "";
});

// Toggle done
function toggleDone(index) {
    wishes[index].done = !wishes[index].done;
    saveAndRender();
}

// Delete wish
function deleteWish(index) {
    if (confirm("Delete this wish?")) {
        wishes.splice(index, 1);
        saveAndRender();
    }
}

// Save to localStorage and render
function saveAndRender() {
    localStorage.setItem('wishes', JSON.stringify(wishes));
    renderList();
}

// Render the list
function renderList() {
    wishList.innerHTML = "";
    wishes.forEach((wish, index) => {
        const li = document.createElement('li');
        li.className = wish.done ? "done" : "";
        li.innerHTML = `
            <span>${wish.text}</span>
            <div class="btn-group">
                <button class="doneBtn" onclick="toggleDone(${index})">${wish.done ? "Undo" : "Done"}</button>
                <button class="deleteBtn" onclick="deleteWish(${index})">Delete</button>
            </div>
        `;
        wishList.appendChild(li);
    });
}
</script>
