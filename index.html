<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKZ Bucket List ✨</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>✨ My SKZ Bucket List ✨</h1>

    <!-- Bucket List -->

    <section class="bucket-container">

        <input
            type="text"
            id="bucketInput"
            placeholder="Add a bucket list dream...">

        <button onclick="addTask()">
            Add ✨
        </button>

        <ul id="bucketList"></ul>

    </section>

    <!-- Polaroid Gallery -->

    <h2>📸 SKZ Memories</h2>

    <section class="gallery">

        <div class="polaroid">
            <img src="images/bangchan.jpg">
            <p>🐺Bang Chan ❤️</p>
        </div>

        <div class="polaroid">
            <img src="images/leeknow.jpg">
            <p>🍮Lee Know 🐰</p>
        </div>

        <div class="polaroid">
            <img src="images/changbin.jpg">
            <p>🏋🏽Changbin💪🏼</p>
        </div>

        <div class="polaroid">
            <img src="images/hyunjin.jpg">
            <p>🥟Hyunjin 🎨</p>
        </div>
        <div class="polaroid">
            <img src="images/han jisung.jpg">
            <p>🐿️Han Jisung🎧</p>
        
        </div>
        <div class="polaroid">
            <img src="images/felix.jpg">
            <p>🎧Felix🐣</p>
        </div>
        <div class="polaroid">
            <img src="images/seungmin.jpg">
            <p>🐾Seungmin🐕</p>
        </div>
        <div class="polaroid">
            <img src="images/jeong-in.jpg">
            <p>𖹭Jeongin 🦊</p>
        </div>
        
    </section>

    <!-- Photo Booth -->

    <h2>📷 Photo Strip Booth</h2>

    <section class="camera-box">

        <video
            id="video"
            autoplay
            playsinline>
        </video>

        <button id="startCamera">
            Start Camera
        </button>

        <button id="capture">
            Capture
        </button>

        <canvas id="canvas"></canvas>

    </section>

    <script src="script.js"></script>

</body>

</html>
